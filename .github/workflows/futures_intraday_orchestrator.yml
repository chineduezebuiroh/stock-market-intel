name: Futures Intraday Orchestrator

on:
  schedule:
    - cron: "1/10 * * * 0-5"
  workflow_dispatch:
    inputs:
      force_1h:
        description: "Force-run 1h branch even if FUTURES_1H_ENABLED=false"
        required: false
        default: "false"

concurrency:
  group: futures-intraday
  cancel-in-progress: false

permissions:
  contents: read
  #contents: write 

jobs:
  futures_intraday_orchestrator:
    runs-on: ubuntu-latest
    env:
      DATA_BACKEND: s3
      S3_BUCKET_DATA: stock-intel-data-prod
      S3_PREFIX_DATA: data
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FUTURES_1H_ENABLED: ${{ vars.FUTURES_1H_ENABLED }}
      FORCE_1H: ${{ github.event.inputs.force_1h || 'false' }}
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run orchestrator
        run: |
          python .github/scripts/run_futures_intraday_orchestrator.py
